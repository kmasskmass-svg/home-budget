<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الميزانية الذكي - أ. كليب الزهراني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3c72;
            --secondary: #2a5298;
            --accent: #00d2ff;
            --success: #00b09b;
            --danger: #ff512f;
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text-main: #2d3436;
            --text-light: #636e72;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
            position: relative;
        }

        h1 {
            color: var(--primary);
            margin: 0;
            font-size: 28px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .prepared-by {
            font-size: 15px;
            font-weight: 700;
            color: var(--surface);
            background: linear-gradient(to right, var(--secondary), var(--primary));
            display: inline-block;
            padding: 6px 20px;
            border-radius: 25px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.2);
        }

        .top-buttons {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            gap: 10px;
        }

        .btn {
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-print { background: #e0e6ed; color: var(--primary); }
        .btn-print:hover { background: #d3dce6; }
        
        .btn-export { background: #d1fae5; color: #059669; }
        .btn-export:hover { background: #a7f3d0; }
        
        .btn-clear { background: #ffeaa7; color: #d63031; }
        .btn-clear:hover { background: #fdcb6e; }

        .settings-panel {
            background: #f8fafc;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 90%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--surface);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #edf2f7;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
        }
        .card:nth-child(1)::before { background: var(--danger); }
        .card:nth-child(2)::before { background: var(--secondary); }
        .card:nth-child(3)::before { background: var(--success); }

        .card h3 {
            margin: 0;
            font-size: 15px;
            color: var(--text-light);
        }

        .card .value {
            font-size: 32px;
            font-weight: 700;
            margin-top: 15px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        <table> {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 800px;
        }

        th {
            background-color: var(--primary);
            color: var(--surface);
            padding: 18px 15px;
            font-size: 15px;
            text-align: right;
        }
        
        th:first-child { border-top-right-radius: 10px; }
        th:last-child { border-top-left-radius: 10px; }

        td {
            padding: 15px;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
            background: var(--surface);
        }

        input.spend-input {
            width: 90px;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            font-family: inherit;
        }
        
        input.spend-input:focus {
            border-color: var(--accent);
            outline: none;
        }

        input.note-input {
            width: 95%;
            padding: 10px;
            border: 1px solid #edf2f7;
            border-radius: 8px;
            font-family: inherit;
            background: #f8fafc;
        }

        .date-cell {
            line-height: 1.6;
        }

        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0, 176, 155, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .show-save { opacity: 1; }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; padding: 0; }
            .top-buttons, .settings-panel { display: none; }
            input { border: none !important; background: transparent !important; }
            th { background-color: #f1f2f6 !important; color: black !important; }
        }
    </style>
</head>
<body>

<div class="save-indicator" id="saveMsg">✅ تم الحفظ تلقائياً</div>

<div class="container">
    <header>
        <div class="top-buttons">
            <button class="btn btn-print" onclick="window.print()">🖨️ طباعة</button>
            <button class="btn btn-clear" onclick="clearData()">🗑️ مسح البيانات</button>
        </div>
        <h1>نظام تقييد الصرف اليومي للبيت</h1>
        <div class="prepared-by">أعده: كليب بن أحمد ضيف الله الزهراني</div>
    </header>

    <div class="settings-panel">
        <div class="settings-grid">
            <div class="input-group">
                <label>الميزانية الإجمالية (ريال)</label>
                <input type="number" id="set-budget" onchange="updateSettings()">
            </div>
            <div class="input-group">
                <label>المدة (أيام)</label>
                <input type="number" id="set-days" onchange="updateSettings()">
            </div>
            <div class="input-group">
                <label>الحد اليومي المستهدف (ريال)</label>
                <input type="number" id="set-daily-limit" onchange="updateSettings()">
            </div>
            <div class="input-group">
                <label>تاريخ البداية</label>
                <input type="date" id="set-date" onchange="updateSettings()">
            </div>
        </div>
    </div>

    <div class="summary-cards">
        <div class="card">
            <h3>إجمالي المنصرف</h3>
            <div class="value" id="totalSpent" style="color: var(--danger)">0.00</div>
        </div>
        <div class="card">
            <h3>الرصيد المتبقي</h3>
            <div class="value" id="remainingBudget" style="color: var(--secondary)">0.00</div>
        </div>
        <div class="card">
            <h3>الحد المتاح للإنفاق اليوم</h3>
            <div class="value" id="avgTarget" style="color: var(--success)">0.00</div>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>اليوم والتاريخ</th>
                    <th style="text-align: center;">المصروف الفعلي</th>
                    <th style="text-align: center;">الهدف المسموح</th>
                    <th style="text-align: center;">مؤشر الأداء</th>
                    <th>البيان / ملاحظات</th>
                </tr>
            </thead>
            <tbody id="budgetBody"></tbody>
        </table>
    </div>
</div>

<script>
    // مفتاح الحفظ في المتصفح
    const STORAGE_KEY = 'kulaib_budget_data';

    // الإعدادات الافتراضية
    let config = {
        budget: 3000,
        days: 30,
        dailyLimit: 100, // الحد اليومي الافتراضي
        startDate: "2026-04-27",
        spending: [],
        notes: []
    };

    // تحميل البيانات المحفوظة (إن وجدت)
    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            config = JSON.parse(saved);
            // لضمان التوافق مع البيانات القديمة التي لم تكن تحتوي على هذا الحقل
            if(!config.dailyLimit) config.dailyLimit = config.budget / config.days;
        } else {
            config.spending = new Array(config.days).fill(null);
            config.notes = new Array(config.days).fill('');
        }
        
        // تحديث حقول الإعدادات بالقيم
        document.getElementById('set-budget').value = config.budget;
        document.getElementById('set-days').value = config.days;
        document.getElementById('set-daily-limit').value = config.dailyLimit;
        document.getElementById('set-date').value = config.startDate;
    }

    // حفظ البيانات
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        showSaveIndicator();
    }

    function showSaveIndicator() {
        const msg = document.getElementById('saveMsg');
        msg.classList.add('show-save');
        setTimeout(() => msg.classList.remove('show-save'), 2000);
    }

    function clearData() {
        if(confirm('هل أنت متأكد أنك تريد مسح جميع البيانات والبدء من جديد؟')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    // تصدير البيانات إلى ملف إكسل (CSV)
    function exportToExcel() {
        let csvContent = "\uFEFF"; // لدعم اللغة العربية في إكسل
        csvContent += "اليوم والتاريخ,المصروف الفعلي,الهدف المسموح,مؤشر الأداء,البيان / ملاحظات\n";

        let startObj = new Date(config.startDate);
        let baseDaily = config.dailyLimit;

        for (let i = 0; i < config.days; i++) {
            let d = new Date(startObj);
            d.setDate(d.getDate() + i);
            const greg = new Intl.DateTimeFormat('ar-SA', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
            
            let spendValue = config.spending[i] !== null ? config.spending[i] : "";
            let noteValue = (config.notes[i] || '').replace(/,/g, '،').replace(/"/g, '""'); // تنظيف الفواصل لمنع تداخل الأعمدة
            
            let status = "-";
            if (config.spending[i] !== null) {
                const diff = baseDaily - config.spending[i];
                status = diff >= 0 ? `+ ${diff.toFixed(0)} وفر` : `- ${Math.abs(diff).toFixed(0)} زيادة`;
            }

            csvContent += `"${greg}","${spendValue}","${baseDaily.toFixed(0)}","${status}","${noteValue}"\n`;
        }

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "تقرير_الميزانية_الذكية.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // تحديث الإعدادات العلوية
    function updateSettings() {
        config.budget = parseFloat(document.getElementById('set-budget').value) || 3000;
        config.dailyLimit = parseFloat(document.getElementById('set-daily-limit').value) || 0;
        let newDays = parseInt(document.getElementById('set-days').value) || 30;
        config.startDate = document.getElementById('set-date').value;

        // تعديل حجم المصفوفات إذا تغير عدد الأيام
        if (newDays !== config.days) {
            config.days = newDays;
            let oldSpending = [...config.spending];
            let oldNotes = [...config.notes];
            
            config.spending = new Array(config.days).fill(null);
            config.notes = new Array(config.days).fill('');
            
            for(let i=0; i<Math.min(oldSpending.length, config.days); i++){
                config.spending[i] = oldSpending[i];
                config.notes[i] = oldNotes[i];
            }
        }
        
        saveData();
        buildTable();
        calculateTotals();
    }

    // بناء الجدول
    function buildTable() {
        const body = document.getElementById('budgetBody');
        body.innerHTML = '';
        
        let startObj = new Date(config.startDate);
        let baseDaily = config.dailyLimit;

        for (let i = 0; i < config.days; i++) {
            let d = new Date(startObj);
            d.setDate(d.getDate() + i);
            
            const dayName = new Intl.DateTimeFormat('ar-SA', { weekday: 'long' }).format(d);
            const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long' }).format(d);
            const greg = new Intl.DateTimeFormat('ar-SA', { day: 'numeric', month: 'long' }).format(d);
            
            let spendValue = config.spending[i] !== null ? config.spending[i] : '';
            let noteValue = config.notes[i] || '';

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="date-cell">
                    <strong style="color: var(--primary)">${dayName}</strong><br>
                    <span style="font-size: 12px; color: var(--text-light)">${hijri} | ${greg}</span>
                </td>
                <td style="text-align: center;">
                    <input type="number" class="spend-input" placeholder="0" value="${spendValue}" 
                           oninput="handleInput(${i}, this.value, 'spend')">
                </td>
                <td style="text-align: center; font-weight: bold;" id="planned-${i}">
                    ${baseDaily.toFixed(0)}
                </td>
                <td style="text-align: center; font-weight: bold;" id="status-${i}">-</td>
                <td>
                    <input type="text" class="note-input" placeholder="اكتب بياناً هنا..." value="${noteValue}"
                           oninput="handleInput(${i}, this.value, 'note')">
                </td>
            `;
            body.appendChild(row);
        }
    }

    function handleInput(idx, val, type) {
        if (type === 'spend') {
            config.spending[idx] = (val === '') ? null : parseFloat(val);
            calculateTotals();
        } else if (type === 'note') {
            config.notes[idx] = val;
        }
        saveData();
    }

    // الحسابات الرياضية
    function calculateTotals() {
        let used = 0;
        let lastFilledIdx = -1;

        config.spending.forEach((val, idx) => {
            if (val !== null && !isNaN(val)) {
                used += val;
                lastFilledIdx = idx;
            }
        });

        const remaining = config.budget - used;
        const daysLeft = config.days - (lastFilledIdx + 1);
        const dynamicAvg = daysLeft > 0 ? (remaining / daysLeft) : 0;
        const baseDaily = config.dailyLimit;

        // تحديث البطاقات
        document.getElementById('totalSpent').textContent = used.toFixed(2);
        document.getElementById('remainingBudget').textContent = remaining.toFixed(2);
        document.getElementById('avgTarget').textContent = (daysLeft > 0 ? dynamicAvg : 0).toFixed(2);

        // تحديث صفوف الجدول
        for (let i = 0; i < config.days; i++) {
            const pCell = document.getElementById(`planned-${i}`);
            const sCell = document.getElementById(`status-${i}`);
            
            if (!pCell || !sCell) continue;

            if (i <= lastFilledIdx) {
                if (config.spending[i] !== null) {
                    const diff = baseDaily - config.spending[i];
                    sCell.textContent = diff >= 0 ? `+ ${diff.toFixed(0)} وفر` : `- ${Math.abs(diff).toFixed(0)} زيادة`;
                    sCell.style.color = diff >= 0 ? 'var(--success)' : 'var(--danger)';
                    pCell.style.color = 'var(--text-light)';
                }
            } else {
                pCell.textContent = dynamicAvg.toFixed(2);
                pCell.style.color = 'var(--primary)';
                sCell.textContent = '-';
                sCell.style.color = 'var(--text-light)';
            }
        }
    }

    // التشغيل الأولي
    loadData();
    buildTable();
    calculateTotals();

</script>
</body>
</html>
